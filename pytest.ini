[pytest]
testpaths = tests
norecursedirs = qbittensor/miner
addopts = -ra -m "not integration"
markers =
    integration: requires Docker daemon (build + run mock_solution container)
filterwarnings =
    ignore:pkg_resources is deprecated:DeprecationWarning:munch.*
    ignore:Pydantic V1 style `@validator` validators are deprecated:DeprecationWarning:qbittensor\.common\.certificate

