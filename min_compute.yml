# Use this document to specify the minimum compute requirements.
# This document will be used to generate a list of recommended hardware for your subnet.

# This is intended to give a rough estimate of the minimum requirements
# so that the user can make an informed decision about whether or not
# they want to run a miner or validator on their machine.

# NOTE: Specification for miners may be different from validators

version: '1.0' # update this version key as needed, ideally should match your release version

compute_spec:

  miner:
    cpu:
      min_cores: 1
      min_speed: 2.0
      recommended_cores: 1
      recommended_speed: 3.0
      architecture: "x86_64"

    gpu:
      required: False
      min_vram: 0
      recommended_vram: 0
      recommended_gpu: "None required (CPU-only)"

    memory:
      min_ram: 8
      recommended_ram: 8

    storage:
      min_space: 100
      recommended_space: 100
      type: "SSD"
      min_iops: 1000
      recommended_iops: 5000

    os:
      name: "Ubuntu"
      version: 22.04

  validator:
    cpu:
      min_cores: 26
      min_speed: 2.5
      recommended_cores: 26
      recommended_speed: 3.5
      architecture: "x86_64"

    gpu:
      required: True
      min_vram: 96
      recommended_vram: 96
      recommended_gpu: "RTX PRO 6000"

    memory:
      min_ram: 96
      recommended_ram: 96

    storage:
      min_space: 50
      recommended_space: 50
      type: "SSD"
      min_iops: 1000
      recommended_iops: 5000

    os:
      name: "Ubuntu"
      version: 22.04

network_spec:
  bandwidth:
    download: 100
    upload: 20
